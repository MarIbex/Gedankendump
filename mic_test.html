<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mikrofon Test</title>
<style>
body{font-family:-apple-system,sans-serif;padding:2rem;background:#1a1a18;color:#eee}
button{padding:1rem 2rem;font-size:18px;border-radius:12px;border:none;background:#0F6E56;color:white;cursor:pointer;margin:1rem 0;display:block;width:100%}
button.red{background:#C0392B}
#log{background:#2C2C2A;border-radius:12px;padding:1rem;margin-top:1rem;min-height:200px;font-size:14px;font-family:monospace;white-space:pre-wrap;word-break:break-all}
#text{font-size:24px;padding:1rem;background:#2C2C2A;border-radius:12px;margin:1rem 0;min-height:60px}
</style>
</head>
<body>
<h2>🎤 Mikrofon Debug-Test</h2>
<div id="text">Sprich nach dem Start...</div>
<button id="btn" onclick="toggle()">▶ Start</button>
<div id="log">Log:\n</div>

<script>
let r = null, running = false, final = '';

function log(msg){
  document.getElementById('log').textContent += '\n' + new Date().toLocaleTimeString() + ': ' + msg;
}

function toggle(){
  if(running){ stop(); } else { start(); }
}

function start(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ log('ERROR: SpeechRecognition nicht verfügbar'); return; }
  r = new SR();
  r.lang = 'de-CH';
  r.continuous = true;
  r.interimResults = true;
  final = '';

  r.onstart = ()=>{ log('STARTED'); document.getElementById('btn').textContent='⏹ Stop'; document.getElementById('btn').className='red'; running=true; };
  
  r.onresult = e=>{
    let interim = '';
    for(let i=e.resultIndex; i<e.results.length; i++){
      if(e.results[i].isFinal){
        final += e.results[i][0].transcript + ' ';
        log('FINAL['+i+']: "' + e.results[i][0].transcript + '" conf:' + e.results[i][0].confidence.toFixed(2));
      } else {
        interim += e.results[i][0].transcript;
        log('interim['+i+']: "' + e.results[i][0].transcript + '"');
      }
    }
    document.getElementById('text').textContent = (final + interim).trim();
    log('BUFFER: "' + final.trim() + '"');
  };

  r.onend = ()=>{ log('END — running='+running); if(running) r.start(); };
  r.onerror = e=>{ log('ERROR: ' + e.error); stop(); };
  r.start();
}

function stop(){
  running = false;
  document.getElementById('btn').textContent='▶ Start';
  document.getElementById('btn').className='';
  if(r){ try{r.stop();}catch(e){} }
  log('STOPPED. Final buffer: "' + final.trim() + '"');
}
</script>
</body>
</html>
